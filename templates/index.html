<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📰 VeriNews AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg1:#0f1c3f; --bg2:#020617;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.12);
  --text:#e5e7eb; --muted:#94a3b8;
  --accent1:#38bdf8; --accent2:#6366f1;

  --real:#22c55e; --real2:#4ade80;
  --fake:#ef4444; --fake2:#f87171;
}

body{
  margin:0; font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  height:100vh; display:flex; align-items:center; justify-content:center;
  color:var(--text); transition:.35s;
}

/* Light mode */
.light-mode{
  background:#f1f5f9; color:#0f172a;
}
.light-mode .container{ background:rgba(0,0,0,0.05); border-color:rgba(0,0,0,0.1); }
.light-mode textarea{ background:#fff; color:#0f172a; }
.light-mode .subtitle,.light-mode .confidence-text{ color:#475569; }

/* Toggle */
.toggle-switch{
  position:absolute; top:20px; right:30px;
  display:flex; align-items:center; gap:8px; cursor:pointer;
}
.switch{
  width:44px; height:24px; border-radius:20px; background:#1e293b; position:relative;
}
.switch::before{
  content:""; position:absolute; top:3px; left:4px;
  width:18px; height:18px; border-radius:50%; background:#fff; transition:.25s;
}
.light-mode .switch::before{ left:22px; }

/* Card */
.container{
  width:470px; padding:40px 60px; border-radius:20px;
  background:var(--card); backdrop-filter:blur(16px);
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}

/* Title gradient */
h1{
  margin:8px 0 4px;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

/* Subtitle */
.subtitle{ font-size:14px; color:var(--muted); margin-bottom:22px; }

/* Textarea */
textarea{
  width:100%; height:130px; resize:none;
  border-radius:14px; border:1px solid var(--border);
  padding:12px; background:#0f172a; color:#fff; outline:none;
}

/* Button */
button{
  width:100%; margin-top:18px; padding:14px;
  border:none; border-radius:14px; cursor:pointer;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  color:#fff; font-weight:700; letter-spacing:.2px;
  transition:.2s;
}
button:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(56,189,248,.25); }

/* Result Card */
.result-card{
  margin-top:20px; padding:18px 18px 16px;
  border-radius:16px; background:rgba(255,255,255,0.07);
  border:1px solid var(--border);
  opacity:0; transform:translateY(16px); pointer-events:none;
  transition:.35s ease;
}
.result-card.show{ opacity:1; transform:translateY(0); pointer-events:auto; }

/* Glow effects */
.result-card.real{ box-shadow:0 0 30px rgba(34,197,94,0.35); }
.result-card.fake{ box-shadow:0 0 30px rgba(239,68,68,0.35); }

/* Header */
.result-header{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
}
.result-text{ font-size:20px; font-weight:700; }

/* Badge */
.badge{
  font-size:12px; font-weight:700; padding:5px 10px;
  border-radius:999px; letter-spacing:.4px;
}
.badge.real{ color:var(--real); border:1px solid rgba(34,197,94,.4); background:rgba(34,197,94,.12); }
.badge.fake{ color:var(--fake); border:1px solid rgba(239,68,68,.4); background:rgba(239,68,68,.12); }

/* Progress */
.progress{
  height:8px; border-radius:999px; overflow:hidden;
  background:rgba(255,255,255,0.1); border:1px solid var(--border);
}
.progress-fill{
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  transition:width .8s ease;
}
.progress-fill.real{ background:linear-gradient(90deg,var(--real),var(--real2)); }
.progress-fill.fake{ background:linear-gradient(90deg,var(--fake),var(--fake2)); }

/* Confidence */
.confidence-text{ margin-top:8px; font-size:13px; color:var(--muted); }

/* Footer */
footer{
  position:absolute; bottom:10px; font-size:13px; color:#94a3b8;
}

/* Floating Icons */
.floating-icon {
    position: absolute;
    font-size: 56px;
    opacity: 0.7;
    animation: float 6s ease-in-out infinite;
    pointer-events: none;
}

.floating-icon:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; }
.floating-icon:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
.floating-icon:nth-child(3) { bottom: 15%; left: 12%; animation-delay: 2s; }
.floating-icon:nth-child(4) { bottom: 10%; right: 8%; animation-delay: 3s; }

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
}

/* Optional glow */
.floating-icon {
    text-shadow: 0 0 15px rgba(56,189,248,0.4);
}

</style>
</head>
<!-- Floating Background Icons -->
<div class="floating-icon">📰</div>
<div class="floating-icon">🔍</div>
<div class="floating-icon">⚡</div>
<div class="floating-icon">📊</div>

<body>

<!-- Toggle -->
<div class="toggle-switch" onclick="toggleMode()">
  <span id="modeText">Dark</span>
  <div class="switch"></div>
</div>

<div class="container">
  <h1>📰 VeriNews AI</h1>
  <div class="subtitle">AI-powered analysis — Paste any headline</div>

  <textarea id="inputText" placeholder="Enter news headline..."></textarea>
  <button onclick="predict()">Analyze</button>

  <!-- Result -->
  <div id="resultCard" class="result-card">
    <div class="result-header">
      <div id="resultText" class="result-text"></div>
      <span id="badge" class="badge"></span>
    </div>

    <div class="progress">
      <div id="progressBar" class="progress-fill"></div>
    </div>

    <div id="confidenceText" class="confidence-text"></div>
  </div>
</div>

<footer>© 2026 Fake News Detection System — Ayush Rewatkar</footer>

<script>
function toggleMode(){
  document.body.classList.toggle("light-mode");
  document.getElementById("modeText").innerText =
    document.body.classList.contains("light-mode") ? "Light" : "Dark";
}

/* 🔊 Sound feedback */
function playSound(type){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);

  if(type==="real"){ o.frequency.value=600; }
  else{ o.frequency.value=220; }

  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.4);
}

/* 📊 Confidence label */
function confidenceLabel(val){
  if(val>=75) return "High Confidence";
  if(val>=50) return "Medium Confidence";
  return "Low Confidence";
}

async function predict(){
  const text = document.getElementById("inputText").value.trim();
  if(!text){ alert("Enter text"); return; }

  const res = await fetch('/predict',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text})
  });

  const data = await res.json();

  const card = document.getElementById("resultCard");
  const resultText = document.getElementById("resultText");
  const badge = document.getElementById("badge");
  const progress = document.getElementById("progressBar");
  const conf = document.getElementById("confidenceText");

  // reset
  card.classList.remove("real","fake","show");
  badge.classList.remove("real","fake");
  progress.classList.remove("real","fake");

  const isReal = data.prediction.includes("Real");

  // apply styles
  if(isReal){
    card.classList.add("real");
    badge.classList.add("real");
    progress.classList.add("real");
    badge.innerText="REAL";
    playSound("real");
  }else{
    card.classList.add("fake");
    badge.classList.add("fake");
    progress.classList.add("fake");
    badge.innerText="FAKE";
    playSound("fake");
  }

  resultText.innerText = data.prediction;

  conf.innerText = `Confidence: ${data.confidence}% (${confidenceLabel(data.confidence)})`;

  progress.style.width="0%";
  setTimeout(()=>{ progress.style.width=data.confidence+"%"; },100);

  card.classList.add("show");
}
</script>

</body>
</html>
